<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Saya</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .toast { animation: slideUp 0.3s ease-out, fadeOut 0.3s ease-out 2s forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full flex flex-col overflow-auto" style="background-color: #0f172a;">
   <header class="py-10 px-6 text-center" style="background-color: #1e40af;">
    <h1 id="el-title" class="text-3xl md:text-4xl font-bold text-white mb-2">Selamat Datang</h1>
    <p id="el-subtitle" class="text-blue-200 text-lg">Website HTML sederhana</p>
   </header>
   <main class="flex-1 flex flex-col items-center justify-center px-6 py-16">
    <h2 id="el-heading" class="text-2xl md:text-3xl font-bold mb-4" style="color: #e2e8f0;">Hello World 👋</h2>
    <p id="el-text" class="mb-8 text-lg" style="color: #94a3b8;">Ini adalah halaman index.html pertama Anda.</p><button id="el-btn" onclick="handleClick()" class="px-8 py-3 rounded-xl font-semibold text-white text-lg transition-all hover:scale-105 active:scale-95 shadow-lg shadow-emerald-500/30" style="background-color: #10b981;"> Klik Saya </button>
    <div id="toast-container" class="mt-6 h-8"></div>
   </main>
   <footer class="py-5 text-center" style="background-color: #1e293b; color: #64748b;">
    © 2026 Website Saya
   </footer>
  </div>
  <script>
        const defaultConfig = {
            background_color: '#0f172a',
            surface_color: '#1e40af',
            text_color: '#e2e8f0',
            primary_action_color: '#10b981',
            secondary_action_color: '#64748b',
            font_family: 'Plus Jakarta Sans',
            font_size: 16,
            welcome_title: 'Selamat Datang',
            subtitle: 'Website HTML sederhana',
            main_heading: 'Hello World 👋',
            main_text: 'Ini adalah halaman index.html pertama Anda.',
            button_text: 'Klik Saya'
        };

        function handleClick() {
            const container = document.getElementById('toast-container');
            container.innerHTML = '<div class="toast inline-block px-5 py-2 rounded-lg text-white font-medium" style="background-color:#10b981;">Halo! Tombol berhasil diklik. ✅</div>';
            setTimeout(() => { container.innerHTML = ''; }, 2500);
        }

        async function onConfigChange(config) {
            const c = { ...defaultConfig, ...config };
            const app = document.getElementById('app');
            app.style.backgroundColor = c.background_color;
            document.querySelector('header').style.backgroundColor = c.surface_color;
            document.getElementById('el-title').textContent = c.welcome_title;
            document.getElementById('el-title').style.fontFamily = `${c.font_family}, sans-serif`;
            document.getElementById('el-subtitle').textContent = c.subtitle;
            document.getElementById('el-heading').textContent = c.main_heading;
            document.getElementById('el-heading').style.color = c.text_color;
            document.getElementById('el-heading').style.fontSize = `${c.font_size * 1.75}px`;
            document.getElementById('el-text').textContent = c.main_text;
            document.getElementById('el-text').style.color = c.secondary_action_color;
            document.getElementById('el-text').style.fontSize = `${c.font_size}px`;
            document.getElementById('el-btn').textContent = c.button_text;
            document.getElementById('el-btn').style.backgroundColor = c.primary_action_color;
            document.getElementById('el-btn').style.fontFamily = `${c.font_family}, sans-serif`;
            document.querySelector('footer').style.backgroundColor = c.surface_color;
            document.querySelector('footer').style.color = c.secondary_action_color;
        }

        window.elementSdk.init({
            defaultConfig,
            onConfigChange,
            mapToCapabilities: (config) => {
                const c = { ...defaultConfig, ...config };
                return {
                    recolorables: [
                        { get: () => c.background_color, set: (v) => { c.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
                        { get: () => c.surface_color, set: (v) => { c.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
                        { get: () => c.text_color, set: (v) => { c.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
                        { get: () => c.primary_action_color, set: (v) => { c.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
                        { get: () => c.secondary_action_color, set: (v) => { c.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
                    ],
                    borderables: [],
                    fontEditable: { get: () => c.font_family, set: (v) => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
                    fontSizeable: { get: () => c.font_size, set: (v) => { c.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
                };
            },
            mapToEditPanelValues: (config) => {
                const c = { ...defaultConfig, ...config };
                return new Map([
                    ['welcome_title', c.welcome_title],
                    ['subtitle', c.subtitle],
                    ['main_heading', c.main_heading],
                    ['main_text', c.main_text],
                    ['button_text', c.button_text]
                ]);
            }
        });
        lucide.createIcons();
    </script>

</html>
